<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频搜索</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;max-width:720px;margin:0 auto;padding:16px;background:#fafafa;color:#333}
.sb{display:flex;gap:6px;margin-bottom:12px}
.sb input{flex:1;padding:8px 10px;font-size:15px;border:1px solid #ccc;border-radius:3px;outline:none}
.sb input:focus{border-color:#4a90d9}
.sb button{padding:8px 18px;font-size:15px;border:none;border-radius:3px;background:#4a90d9;color:#fff;cursor:pointer}
.sb button:hover{background:#357abd}
.tip{text-align:center;padding:24px 0;color:#999;font-size:14px}
.back{display:inline-block;margin-bottom:8px;padding:4px 10px;background:#eee;border-radius:3px;cursor:pointer;font-size:13px;color:#555}
.back:hover{background:#ddd}
.it{padding:8px 10px;margin-bottom:3px;background:#fff;border-radius:3px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px}
.it:hover{background:#eef4fb}
.it.dir{color:#1a6b1a}
.it.vid{color:#333}
.it .sz{margin-left:auto;color:#aaa;font-size:12px;flex-shrink:0}
.it .tag{font-size:11px;color:#fff;background:#4a90d9;border-radius:2px;padding:1px 5px;flex-shrink:0}
.it .tag.d{background:#1a6b1a}
.crumb{font-size:12px;color:#999;margin-bottom:8px;word-break:break-all}
</style>
</head>
<body>

<div class="sb">
  <input type="text" id="kw" placeholder="输入视频名称搜索" autofocus autocomplete="off">
  <button onclick="doSearch()">搜索</button>
</div>
<div id="main"></div>

<script>
/* 导航栈，用于返回上级目录 */
var stack = [];
var el = document.getElementById('main');
var kwEl = document.getElementById('kw');

/* 回车触发搜索 */
kwEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

/* 搜索：调用后端搜索接口 */
function doSearch() {
  var kw = kwEl.value.trim();
  if (!kw) return;
  stack = [];
  el.innerHTML = '<div class="tip">搜索中...</div>';
  fetch('/api/search?q=' + encodeURIComponent(kw))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.results || d.results.length === 0) {
        el.innerHTML = '<div class="tip">未找到结果</div>';
        return;
      }
      el.innerHTML = '';
      for (var i = 0; i < d.results.length; i++) {
        var r = d.results[i];
        var div = document.createElement('div');
        div.className = 'it dir';
        div.innerHTML = '<span class="tag d">目录</span>' + esc(r.name)
                      + '<span class="sz">' + esc(r.path) + '</span>';
        /* 使用闭包绑定点击事件，避免路径中特殊字符导致转义问题 */
        (function(p, n) {
          div.onclick = function() { browse(p, n); };
        })(r.path, r.name);
        el.appendChild(div);
      }
    })
    .catch(function() { el.innerHTML = '<div class="tip">搜索出错</div>'; });
}

/* 浏览目录：列出子目录和视频文件 */
function browse(path, name) {
  stack.push({path: path, name: name});
  el.innerHTML = '<div class="tip">加载中...</div>';
  fetch('/api/list?path=' + encodeURIComponent(path))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      el.innerHTML = '';
      /* 返回按钮 */
      if (stack.length > 1) {
        var bk = document.createElement('div');
        bk.className = 'back';
        bk.textContent = '\u2190 返回上级';
        bk.onclick = goBack;
        el.appendChild(bk);
      }
      /* 面包屑路径 */
      var crumb = document.createElement('div');
      crumb.className = 'crumb';
      crumb.textContent = path;
      el.appendChild(crumb);

      if (!d.items || d.items.length === 0) {
        var tip = document.createElement('div');
        tip.className = 'tip';
        tip.textContent = '目录为空';
        el.appendChild(tip);
        return;
      }
      /* 分类：目录、文件（不限制后缀，所有文件均可播放） */
      var dirs = [], files = [];
      for (var i = 0; i < d.items.length; i++) {
        var it = d.items[i];
        if (it.is_dir) dirs.push(it);
        else files.push(it);
      }
      /* 渲染子目录 */
      for (var i = 0; i < dirs.length; i++) {
        var it = dirs[i];
        var div = document.createElement('div');
        div.className = 'it dir';
        div.innerHTML = '<span class="tag d">目录</span>' + esc(it.name);
        (function(p, n) {
          div.onclick = function() { browse(p, n); };
        })(it.path, it.name);
        el.appendChild(div);
      }
      /* 渲染文件（不限制后缀，均可点击播放） */
      for (var i = 0; i < files.length; i++) {
        var it = files[i];
        var div = document.createElement('div');
        div.className = 'it vid';
        div.innerHTML = '<span class="tag">播放</span>' + esc(it.name)
                      + '<span class="sz">' + fmtSize(it.size) + '</span>';
        (function(p) {
          div.onclick = function() { play(p); };
        })(it.path);
        el.appendChild(div);
      }
    })
    .catch(function() { el.innerHTML = '<div class="tip">加载出错</div>'; });
}

/* 返回上级目录 */
function goBack() {
  stack.pop();
  if (stack.length === 0) { doSearch(); return; }
  var prev = stack[stack.length - 1];
  stack.pop();
  browse(prev.path, prev.name);
}

/* 播放：获取直链后通过 potplayer:// 协议唤起本地 PotPlayer */
function play(path) {
  el.innerHTML = '<div class="tip">正在获取播放地址...</div>';
  fetch('/api/play?path=' + encodeURIComponent(path))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.url) {
        /* 核心：potplayer:// 协议唤起本地播放器 */
        window.location.href = 'potplayer://' + d.url;
        /* 延迟恢复目录界面 */
        setTimeout(function() { goBack(); }, 1500);
      } else {
        alert('无法获取播放地址' + (d.error ? '\uff1a' + d.error : ''));
        goBack();
      }
    })
    .catch(function() {
      alert('获取播放地址失败');
      goBack();
    });
}

/* HTML 转义（防 XSS） */
function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* 文件大小格式化 */
function fmtSize(b) {
  if (!b) return '';
  if (b < 1024) return b + 'B';
  if (b < 1048576) return (b / 1024).toFixed(1) + 'K';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + 'M';
  return (b / 1073741824).toFixed(2) + 'G';
}
</script>
</body>
</html>
