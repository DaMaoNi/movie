{% extends "base.html" %}

{% block title %}大猫影视{% endblock %}

{% block content %}
<div style="text-align: center; padding: 100px 20px;">
    <h1 style="font-size: 48px; margin-bottom: 40px;">🎬 大猫影视</h1>
    <form action="{{ url_for('search') }}" method="get" style="max-width: 600px; margin: 0 auto;">
        <input type="text" name="keyword" placeholder="输入影视名称搜索..."
               style="width: 100%; padding: 20px 30px; font-size: 20px; border: none; border-radius: 50px; outline: none; box-shadow: 0 5px 30px rgba(233,69,96,0.3);"
               required autofocus autocomplete="off">
    </form>
</div>
{% endblock %}
