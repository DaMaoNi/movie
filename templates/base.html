<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}大猫影视{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 20px; color: #e94560; }
        .header a { color: #fff; text-decoration: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .item-list { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .item {
            display: flex; align-items: center; padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .item:hover { background: rgba(233,69,96,0.1); }
        .item:last-child { border-bottom: none; }
        .item-icon { font-size: 24px; margin-right: 15px; }
        .item-name { flex: 1; font-size: 16px; }
        .item-size { color: #888; font-size: 14px; margin-right: 15px; }
        .btn {
            padding: 8px 16px; background: #e94560; border: none;
            border-radius: 5px; color: white; cursor: pointer;
        }
        .btn:hover { background: #ff6b6b; }
        .empty { text-align: center; padding: 60px 0; color: #888; }
        .footer { text-align: center; padding: 30px; color: #666; margin-top: 50px; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(233,69,96,0.9); color: #fff; padding: 12px 24px;
            border-radius: 8px; font-size: 14px; z-index: 999; display: none;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="header">
        <h1><a href="{{ url_for('index') }}">🎬 大猫影视</a></h1>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="toast" id="toast"></div>
    <div class="footer">大猫影视</div>
    {% block extra_js %}{% endblock %}
    <script>
    function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(function() { t.style.display = 'none'; }, 3000);
    }

    function browseFolder(path) {
        window.location.href = `/browse?path=${encodeURIComponent(path)}`;
    }

    function playVideo(path) {
        fetch(`/api/direct_play/${encodeURIComponent(path)}`)
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = `potplayer://${data.raw_url}`;
                } else {
                    showToast('资源不可用');
                }
            })
            .catch(function() {
                showToast('网络请求失败');
            });
    }
    </script>
</body>
</html>
